<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Mobile: full-screen, no zoom, no scroll bounce -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#87ceeb" />
  <meta name="screen-orientation" content="landscape" />

  <title>Coin Collector</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;           /* no scroll bars on mobile */
      background: #1a1a2e;        /* dark surround when bars appear */
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;         /* prevent browser swipe-to-refresh etc. */
    }

    #game-container {
      width: 100%;
      height: 100%;
    }

    /* Remove the default blue tap highlight on mobile */
    canvas {
      -webkit-tap-highlight-color: transparent;
      outline: none;
      display: block;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
