<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Force landscape, block zoom, prevent scroll -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#87ceeb" />

  <title>Coin Collector</title>
  <link rel="manifest" href="/manifest.json" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container canvas {
      display: block;
      /* Let Phaser Scale Manager handle sizing — just remove extra spacing */
      -webkit-tap-highlight-color: transparent;
      outline: none;
      touch-action: none;
    }

    /* 🔄 Rotate prompt — shown when phone is in portrait */
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: sans-serif;
      font-size: 20px;
      text-align: center;
      gap: 20px;
    }

    #rotate-prompt .icon {
      font-size: 56px;
      animation: rockit 1.2s ease-in-out infinite alternate;
    }

    @keyframes rockit {
      from { transform: rotate(-25deg); }
      to   { transform: rotate(25deg); }
    }

    @media (orientation: portrait) {
      #rotate-prompt { display: flex; }
    }
  </style>
</head>
<body>

  <div id="rotate-prompt">
    <div class="icon">📱</div>
    <div>Rotate your device to landscape<br>to play Coin Collector</div>
  </div>

  <div id="game-container"></div>

  <script type="module" src="./src/main.js"></script>

  <script>
    // Try to lock orientation to landscape (works on Android Chrome)
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock("landscape").catch(() => {});
    }
  </script>

</body>
</html>
